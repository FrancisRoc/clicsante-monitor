name: clicsante-monitor

on:
  schedule:
    # Every 5 minutes (GitHub's minimum). Times are UTC. Scheduled runs can be
    # delayed a few minutes when GitHub is busy.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you run it on-demand from the Actions tab

concurrency:
  group: clicsante-monitor
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit the state file back to the repo

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check availability and notify
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ vars.NTFY_SERVER }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          # Optional overrides (otherwise the defaults baked into the script are used):
          CS_ESTABLISHMENT: ${{ vars.CS_ESTABLISHMENT }}
          CS_PLACE: ${{ vars.CS_PLACE }}
          CS_SERVICES: ${{ vars.CS_SERVICES }}
          CS_LOOKAHEAD_DAYS: ${{ vars.CS_LOOKAHEAD_DAYS }}
        run: python check_availability.py

      - name: Persist state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "clicsante-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "state update [skip ci]"
            git push
          else
            echo "no state change"
          fi
