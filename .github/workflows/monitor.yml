name: clicsante-monitor

on:
  schedule:
    # Every 10 minutes. Times are UTC; scheduled runs can be delayed a few
    # minutes when GitHub is busy. Repo is PUBLIC -> unlimited free Actions
    # minutes, so cadence is not constrained by billing.
    - cron: "*/10 * * * *"
  workflow_dispatch:      # run on-demand from the Actions tab
    inputs:
      selftest:
        description: "Send a labelled TEST availability push (validate the pipeline) instead of a real check"
        type: boolean
        default: false

concurrency:
  group: clicsante-monitor
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit the state file back to the repo

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5   # runs on Node 24; ubuntu-latest already has python3

      - name: Check availability and notify
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ vars.NTFY_SERVER }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          # Optional health/observability (off unless you set them):
          HEARTBEAT_PUSH: ${{ vars.HEARTBEAT_PUSH }}     # set repo variable to 1 for a daily "still alive" push
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }} # e.g. a healthchecks.io ping URL (dead-man's switch)
          # Optional overrides (otherwise the defaults baked into the script are used):
          CS_ESTABLISHMENT: ${{ vars.CS_ESTABLISHMENT }}
          CS_PLACE: ${{ vars.CS_PLACE }}
          CS_SERVICES: ${{ vars.CS_SERVICES }}
          CS_LOOKAHEAD_DAYS: ${{ vars.CS_LOOKAHEAD_DAYS }}
        run: |
          if [[ "${{ inputs.selftest }}" == "true" ]]; then
            python check_availability.py --selftest
          else
            python check_availability.py
          fi

      - name: Persist state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "clicsante-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "state update [skip ci]"
            git push
          else
            echo "no state change"
          fi
